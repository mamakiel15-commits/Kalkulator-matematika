<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kalkulator PWA - Aplikasi kalkulator yang bisa digunakan offline">
    <meta name="theme-color" content="#4CAF50">
    <title>Kalkulator PWA</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="calculator">
            <h1>Kalkulator</h1>
            <div class="display">
                <input type="text" id="display" class="display-input" readonly>
            </div>
            <div class="buttons">
                <button class="btn btn-clear" onclick="clearDisplay()">C</button>
                <button class="btn btn-clear" onclick="deleteLast()">DEL</button>
                <button class="btn btn-operator" onclick="appendOperator('/')">÷</button>
                <button class="btn btn-operator" onclick="appendOperator('*')">×</button>

                <button class="btn" onclick="appendNumber('7')">7</button>
                <button class="btn" onclick="appendNumber('8')">8</button>
                <button class="btn" onclick="appendNumber('9')">9</button>
                <button class="btn btn-operator" onclick="appendOperator('-')">−</button>

                <button class="btn" onclick="appendNumber('4')">4</button>
                <button class="btn" onclick="appendNumber('5')">5</button>
                <button class="btn" onclick="appendNumber('6')">6</button>
                <button class="btn btn-operator" onclick="appendOperator('+')">+</button>

                <button class="btn" onclick="appendNumber('1')">1</button>
                <button class="btn" onclick="appendNumber('2')">2</button>
                <button class="btn" onclick="appendNumber('3')">3</button>
                <button class="btn btn-decimal" onclick="appendDecimal()">.</button>

                <button class="btn" onclick="appendNumber('0')">0</button>
                <button class="btn btn-equals" onclick="calculate()">=</button>
            </div>
        </div>
    </div>

    <button id="installBtn" class="install-btn" style="display: none;">
        📥 Instal Aplikasi
    </button>

    <script src="app.js"></script>
</body>
                                                                                  </html>
